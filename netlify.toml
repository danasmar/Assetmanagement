[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API routes — served by Netlify Functions before the SPA catch-all
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — must come AFTER the API redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
